name: 🍎 MacIntosh Builds
on: [ workflow_call, workflow_dispatch ]

jobs:
  build:
    name: 🍎 MacIntosh ${{ matrix.arch }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runs_on: macos-15-intel
            py_arch: x64
            plugin_version: "1.1.4"
            blender_version: "5.1.0"
            blender_arch: x64
          - arch: arm64
            runs_on: macos-15
            py_arch: arm64
            plugin_version: "1.1.4"
            blender_version: "5.1.0"
            blender_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
        
      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: ${{ matrix.py_arch }}  # x64 or arm64

      - name: Download Wheels
        run: |
          mkdir source/wheels
          # Optional, fail fast if no native wheel exists for this arch
          pip wheel -w source/wheels allosaurus

      - name: Create manifest
        run: |
          cd source
          (cat ../blender_manifest_template_mac.toml; echo "wheels = ["; ls -1 wheels | sed 's/\(^.*$\)/  "\.\/wheels\/\1",/'; echo "]") > blender_manifest.toml

      - name: Setup Blender
        run: |
          cd ${{ github.workspace }}
          BLENDER_VOLUME="blender-${{ matrix.blender_version }}-macos-${{ matrix.blender_arch }}"
          BLENDER_ARCHIVE="${BLENDER_VOLUME}.dmg"
          BLENDER_URL="https://download.blender.org/release/Blender5.1/${BLENDER_ARCHIVE}"
          curl -L ${BLENDER_URL} -o ${BLENDER_ARCHIVE}
          hdiutil attach ${BLENDER_ARCHIVE}
          echo "--ls /Volumes/Blender/Blender.app/Contents/MacOS--"
          ls /Volumes/Blender/Blender.app/Contents/MacOS

      - name: Build Extension
        run: |
          cd ${{ github.workspace }}
          mkdir extension
          "/Volumes/Blender/Blender.app/Contents/MacOS/Blender" --command extension build --source-dir source --output-filepath "extension/parrotLipsync-${{ matrix.plugin_version }}-macos-${{ matrix.arch }}.zip"
          cd extension
          unzip "parrotLipsync-${{ matrix.plugin_version }}-macos-${{ matrix.arch }}.zip" -d "parrotLipsync-${{ matrix.plugin_version }}-macos-${{ matrix.arch }}-blender_${{ matrix.blender_version }}"

      - name: Upload Package
        uses: actions/upload-artifact@v6
        with:
          name: parrotLipsync-${{ matrix.plugin_version }}-macos-${{ matrix.arch }}
          path: "extension/parrotLipsync-${{ matrix.plugin_version }}-macos-${{ matrix.arch }}-blender_${{ matrix.blender_version }}"
          compression-level: 0
